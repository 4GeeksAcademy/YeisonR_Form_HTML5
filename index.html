<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <form class="container border p-0 mt-3 shadow-sm">
        <h1>Payment form example</h1>
    
        <div class="row mt-3">
            <div class="col bg-violet">Some fields are missing</div>
        </div>
    
        <div class="row mt-3">
            <div class="col-5">
                <div class="input-formcss">
                    <label for="exampleInputCard" class="form-label">Card</label>
                    <input maxlength="16" type="text" class="form-control" id="exampleInputCard" placeholder="xxxx-xxxx-xxxx-xxxx">
                </div>
            </div>

            <div class="col-3">
                <div class="input-formcss">
                    <label for="exampleInputNumber" class="form-label">CVC #</label>
                    <input maxlength="3" type="number" class="form-control" id="exampleInputNumber" placeholder="000">
                </div>            
            </div>
            
            <div class="col-4">
                <div class="input-formcss">
                    <label for="exampleInputAmount" class="form-label">Amount</label>
                    <input maxlength="7" type="number" class="form-control" id="exampleInputAmount" placeholder="Amount">
                </div>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-6">
                <div class="input-formcss">
                    <label for="exampleInputFirtsName" class="form-label">Firts Name</label>
                    <input type="text" class="form-control" id="exampleInputFirstName">
                </div>
            </div>

            <div class="col-6">
                <div class="input-formcss">
                    <label for="exampleInputLastName" class="form-label">Last Name</label>
                    <input type="text" class="form-control" id="exampleInputLastName">
                </div>            
            </div>        
        </div>

        <div class="row mt-3">
            <div class="col-6">
                <div class="input-formcss">
                    <label for="exampleInputCity" class="form-label">City</label>
                    <input type="text" class="form-control" id="exampleInputCity">
                </div>
            </div>

            <div class="col-3">
                <div class="input-formcss">
                    <label for="exampleInputState" class="form-label">State</label>
                    <input type="text" class="form-control" id="exampleInputState" placeholder="Pick state">
                </div>            
            </div>
            
            <div class="col-3">
                <div class="input-formcss">
                    <label for="exampleInputPostalCode" class="form-label">Postal Code</label>
                    <input maxlength="5" type="number" class="form-control" id="exampleInputPostalCode">
                </div>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-6">
                <div class= "mb-4 mt-2 text-start">
                    <label for="exampleFormControlInput1" class="form-label">We acept:</label>
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS78XmwUOjf1LnWzQkUOWxfUGcp7kon_VclvvTOuU41Hw&s&ec=121585071">
                </div>
            </div>
            <div class="col-6">
                <div class="mb-3">
                <label for="exampleFormControlTextarea1" class="form-label">Message</label>
                <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
                <div class="form-text text-start">Add any notes here.</div>
                </div>
            </div>
        </div>

        <div class="row bg-light border-top g-0 m-0 justify-content-end p-3">
            <div class="col-auto d-flex gap-2">
                <button type="button" class="btn btn-secondary">Cancel</button>
                <button type="submit" class="btn btn-primary">Send</button>
            </div>
        </div>
     </form>
</body>

</html>
